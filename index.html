<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>鉅星旅運｜後台儀表板</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: "微軟正黑體", "Noto Sans TC", sans-serif;
  background: #f5f7fa;
  color: #1a1a1a;
  height: 100vh;
  display: flex;
  flex-direction: column;
}

/* 頂部 */
header {
  background: linear-gradient(135deg, #1A3A5C 0%, #0D2340 100%);
  color: #fff;
  padding: 20px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  flex-shrink: 0;
}

header h1 {
  font-size: 24px;
  margin-bottom: 8px;
}

header p {
  font-size: 13px;
  opacity: 0.8;
}

/* 主容器 */
.main-container {
  display: flex;
  gap: 20px;
  padding: 20px;
  overflow: hidden;
  flex: 1;
}

/* 左側 - 利潤率控制 */
.section {
  background: #fff;
  border-radius: 12px;
  padding: 20px;
  box-shadow: 0 2px 16px rgba(26,58,92,0.12);
}

.section-left {
  width: 300px;
  flex-shrink: 0;
  overflow-y: auto;
}

.section-right {
  flex: 1;
  overflow-y: auto;
}

.section h2 {
  font-size: 16px;
  margin-bottom: 16px;
  color: #1A3A5C;
  border-bottom: 2px solid #E8F5EE;
  padding-bottom: 10px;
}

.section h3 {
  font-size: 13px;
  margin-top: 16px;
  margin-bottom: 8px;
  color: #555;
  font-weight: 600;
}

/* 利潤率滑桿 */
.margin-control {
  margin: 20px 0;
}

.margin-display {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
}

.margin-value {
  font-size: 32px;
  font-weight: 700;
  color: #1A6E3C;
}

.margin-value span {
  font-size: 20px;
}

input[type="range"] {
  width: 100%;
  height: 8px;
  border-radius: 5px;
  background: linear-gradient(90deg, #1565C0 0%, #2E7D32 100%);
  outline: none;
  -webkit-appearance: none;
  cursor: pointer;
}

input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  appearance: none;
  width: 24px;
  height: 24px;
  border-radius: 50%;
  background: #fff;
  cursor: pointer;
  box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  border: 3px solid #1A3A5C;
}

input[type="range"]::-moz-range-thumb {
  width: 24px;
  height: 24px;
  border-radius: 50%;
  background: #fff;
  cursor: pointer;
  box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  border: 3px solid #1A3A5C;
}

/* 按鈕 */
.btn {
  background: #1A3A5C;
  color: #fff;
  border: none;
  padding: 10px 16px;
  border-radius: 8px;
  cursor: pointer;
  font-family: inherit;
  font-size: 13px;
  font-weight: 600;
  transition: all 0.2s;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}

.btn:hover {
  background: #0D2340;
  transform: translateY(-2px);
  box-shadow: 0 4px 12px rgba(26,58,92,0.2);
}

.btn-refresh {
  background: #2E7D32;
  margin: 12px 0;
  width: 100%;
  justify-content: center;
}

.btn-refresh:hover {
  background: #1B5E20;
}

/* 成本表 */
.cost-table {
  margin-top: 20px;
  font-size: 12px;
}

.cost-table table {
  width: 100%;
  border-collapse: collapse;
}

.cost-table th {
  background: #f0f4f9;
  padding: 10px 8px;
  text-align: left;
  font-weight: 600;
  border-bottom: 2px solid #ddd;
  color: #1A3A5C;
}

.cost-table td {
  padding: 8px;
  border-bottom: 1px solid #eee;
}

.cost-table tr:hover {
  background: #f9f9f9;
}

.cost-thb { color: #1565C0; font-weight: 600; }
.cost-sell { color: #2E7D32; font-weight: 600; }
.cost-profit { color: #D4860A; font-weight: 600; }

/* 訂單列表 */
.orders-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
}

.orders-count {
  background: #E8F5EE;
  color: #1A6E3C;
  padding: 4px 10px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 600;
}

.orders-table {
  margin-top: 12px;
}

.orders-table table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
}

.orders-table th {
  background: #f0f4f9;
  padding: 10px 8px;
  text-align: left;
  font-weight: 600;
  border-bottom: 2px solid #ddd;
  color: #1A3A5C;
  position: sticky;
  top: 0;
}

.orders-table td {
  padding: 10px 8px;
  border-bottom: 1px solid #eee;
  word-break: break-word;
}

.orders-table tr:hover {
  background: #f9f9f9;
}

.status-new {
  background: #E3F2FD;
  color: #1565C0;
  padding: 3px 8px;
  border-radius: 4px;
  font-weight: 600;
  font-size: 11px;
}

.loading {
  text-align: center;
  color: #888;
  padding: 20px;
}

.error {
  background: #FFEBEE;
  color: #C62828;
  padding: 12px;
  border-radius: 8px;
  margin: 10px 0;
  border-left: 4px solid #C62828;
}

@media (max-width: 1200px) {
  .main-container {
    flex-direction: column;
  }
  .section-left {
    width: 100%;
  }
}

/* 滾動條 */
::-webkit-scrollbar {
  width: 8px;
}
::-webkit-scrollbar-track {
  background: #f1f1f1;
  border-radius: 10px;
}
::-webkit-scrollbar-thumb {
  background: #888;
  border-radius: 10px;
}
::-webkit-scrollbar-thumb:hover {
  background: #555;
}

/* 密碼保護 */
#password-screen {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: linear-gradient(135deg, #1A3A5C 0%, #0D2340 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9999;
}

.password-box {
  background: #fff;
  padding: 40px;
  border-radius: 12px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.2);
  text-align: center;
  max-width: 400px;
  width: 90%;
}

.password-box h2 {
  color: #1A3A5C;
  margin-bottom: 20px;
  font-size: 24px;
}

.password-box p {
  color: #666;
  margin-bottom: 30px;
}

.password-box input {
  width: 100%;
  padding: 12px;
  border: 2px solid #ddd;
  border-radius: 8px;
  font-size: 16px;
  margin-bottom: 20px;
  font-family: inherit;
}

.password-box input:focus {
  outline: none;
  border-color: #1A3A5C;
}

.password-box button {
  width: 100%;
  padding: 12px;
  background: #1A3A5C;
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.3s;
}

.password-box button:hover {
  background: #0D2340;
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(26, 58, 92, 0.3);
}

body.authenticated #password-screen {
  display: none;
}

body:not(.authenticated) #main-content {
  display: none !important;
}

</style>
</head>
<body>

<!-- 密碼驗證界面 -->
<div id="password-screen">
  <div class="password-box">
    <div id="password-form">
      <h2>🔐 管理後台</h2>
      <p>請輸入密碼以訪問後台</p>
      <input type="password" id="password-input" placeholder="輸入密碼..." onkeypress="if(event.key==='Enter') verifyPassword()">
      <button onclick="verifyPassword()">登入</button>
    </div>
    <div id="code-form" style="display:none">
      <h2>✅ 二級驗證</h2>
      <p>驗證碼已發送到您的郵箱</p>
      <p style="font-size:12px;color:#888;margin-bottom:16px">sytbkk0122@gmail.com</p>
      <input type="text" id="code-input" placeholder="輸入 6 位驗證碼..." maxlength="6" onkeypress="if(event.key==='Enter') verifyCode()">
      <button onclick="verifyCode()">驗證</button>
      <button onclick="backToPassword()" style="margin-top:10px;background:#ccc;color:#333">返回</button>
    </div>
  </div>
</div>

<div id="main-content">

<header>
  <h1>🏢 鉅星旅運 - 後台儀表板</h1>
  <p>即時調整利潤率 • 監控訂單進度</p>
</header>

<div class="main-container">
  <!-- 左側：利潤率控制 -->
  <div class="section section-left">
    <h2>💰 定價控制</h2>

    <div class="margin-control">
      <div class="margin-display">
        <span>利潤率</span>
        <div class="margin-value"><span id="margin-display">20</span>%</div>
      </div>
      <input type="range" id="margin-slider" min="10" max="50" value="20">
      <p style="font-size:11px;color:#888;margin-top:8px">調整滑桿改變所有報價</p>
    </div>

    <button class="btn btn-refresh" onclick="refreshOrders()">
      🔄 重新載入訂單
    </button>

    <div class="cost-table">
      <h3>📊 成本結構示例</h3>
      <table>
        <thead>
          <tr>
            <th>景點</th>
            <th>成本 (THB)</th>
            <th>利潤</th>
            <th>售價 (TWD)</th>
          </tr>
        </thead>
        <tbody id="cost-example">
          <tr>
            <td>大皇宮</td>
            <td class="cost-thb">500</td>
            <td class="cost-profit">184</td>
            <td class="cost-sell">871</td>
          </tr>
          <tr>
            <td>泰國廟</td>
            <td class="cost-thb">300</td>
            <td class="cost-profit">110</td>
            <td class="cost-sell">523</td>
          </tr>
          <tr>
            <td>夜遊船</td>
            <td class="cost-thb">800</td>
            <td class="cost-profit">293</td>
            <td class="cost-sell">1397</td>
          </tr>
        </tbody>
      </table>
      <p style="font-size:11px;color:#888;margin-top:8px">
        公式：(成本 + 200) × 0.92 × (1 + 利潤率%)
      </p>
    </div>
  </div>

  <!-- 右側：訂單列表 -->
  <div class="section section-right">
    <div class="orders-header">
      <h2 style="margin: 0;">📋 訂單列表</h2>
      <span class="orders-count" id="order-count">0 筆</span>
    </div>

    <div id="error-msg" style="display:none"></div>
    <div id="loading" class="loading">載入中...</div>

    <div class="orders-table" id="orders-container" style="display:none">
      <table>
        <thead>
          <tr>
            <th>時間</th>
            <th>姓名</th>
            <th>郵件</th>
            <th>電話</th>
            <th>出發日期</th>
            <th>人數</th>
            <th>費用 (NT$)</th>
            <th>行程概要</th>
          </tr>
        </thead>
        <tbody id="orders-body">
        </tbody>
      </table>
    </div>
  </div>
</div>

<script>
// 本地訂單服務器
const WEB_APP_URL = 'http://localhost:9999';

// 利潤率控制
document.getElementById('margin-slider').addEventListener('input', (e) => {
  const margin = e.target.value;
  document.getElementById('margin-display').textContent = margin;
  updateCostTable(margin);
  // 儲存到 localStorage
  localStorage.setItem('margin', margin);
});

// 初始化利潤率
window.addEventListener('load', () => {
  const savedMargin = localStorage.getItem('margin') || '20';
  document.getElementById('margin-slider').value = savedMargin;
  document.getElementById('margin-display').textContent = savedMargin;
  updateCostTable(savedMargin);
  refreshOrders();
  // 每 10 秒自動更新一次訂單
  setInterval(refreshOrders, 10000);
});

// 更新成本表
function updateCostTable(margin) {
  const marginPercent = (parseInt(margin) / 100);
  const examples = [
    {name: '大皇宮', cost: 500},
    {name: '泰國廟', cost: 300},
    {name: '夜遊船', cost: 800}
  ];

  const tbody = document.getElementById('cost-example');
  tbody.innerHTML = '';

  examples.forEach(ex => {
    const profit = Math.round((ex.cost + 200) * 0.92 * marginPercent);
    const sell = Math.round((ex.cost + 200) * 0.92 * (1 + marginPercent));

    tbody.innerHTML += `
      <tr>
        <td>${ex.name}</td>
        <td class="cost-thb">${ex.cost}</td>
        <td class="cost-profit">${profit}</td>
        <td class="cost-sell">${sell}</td>
      </tr>
    `;
  });
}

// 重新載入訂單
function refreshOrders() {
  const loadingDiv = document.getElementById('loading');
  const errorDiv = document.getElementById('error-msg');
  const ordersDiv = document.getElementById('orders-container');

  loadingDiv.style.display = 'block';
  errorDiv.style.display = 'none';
  ordersDiv.style.display = 'none';

  fetch(WEB_APP_URL)
    .then(response => response.json())
    .then(data => {
      loadingDiv.style.display = 'none';

      if(!data.success) {
        errorDiv.style.display = 'block';
        errorDiv.className = 'error';
        errorDiv.textContent = '❌ 載入訂單失敗：' + (data.error || '未知錯誤');
        return;
      }

      const orders = data.orders || [];
      const tbody = document.getElementById('orders-body');

      if(orders.length === 0) {
        tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;color:#888">還沒有訂單</td></tr>';
      } else {
        tbody.innerHTML = orders.map(order => `
          <tr>
            <td>${order.timestamp || order.時間 || '─'}</td>
            <td><strong>${order.name || order.姓名 || '─'}</strong></td>
            <td style="font-size:11px">${order.email || order.郵件 || '─'}</td>
            <td>${order.phone || order.電話 || '─'}</td>
            <td>${order.dep || order.出發日期 || '─'}</td>
            <td>${order.adults || order.人數 || '─'}</td>
            <td class="cost-sell">NT$ ${(order.grand || order.總價 || '0').toLocaleString()}</td>
            <td style="font-size:11px;max-width:200px">${((order.itinerary || order.行程詳情) || '─').substring(0, 30)}...</td>
          </tr>
        `).join('');
      }

      document.getElementById('order-count').textContent = orders.length + ' 筆';
      ordersDiv.style.display = 'block';
    })
    .catch(err => {
      loadingDiv.style.display = 'none';
      errorDiv.style.display = 'block';
      errorDiv.className = 'error';
      errorDiv.textContent = '❌ 連接失敗：' + err.message;
      console.error('Error:', err);
    });
}
</script>

<!-- 密碼驗證 JavaScript -->
<script>
const ADMIN_PASSWORD = 'syt0122'; // 管理後台密碼
let verificationCode = null;

function generateCode() {
  return Math.floor(100000 + Math.random() * 900000).toString();
}

function verifyPassword() {
  const input = document.getElementById('password-input');
  const password = input.value;

  if (password === ADMIN_PASSWORD) {
    // 密碼正確 → 進入驗證碼驗證
    verificationCode = generateCode();

    // 顯示驗證碼給用戶（實際應用會發送郵件）
    console.log('🔐 你的驗證碼是:', verificationCode);
    alert(`✅ 密碼正確！\n\n🔐 你的驗證碼是：\n\n${verificationCode}\n\n請在下一頁面輸入此驗證碼`);

    // 切換到驗證碼輸入屏幕
    document.getElementById('password-form').style.display = 'none';
    document.getElementById('code-form').style.display = 'block';
    document.getElementById('code-input').focus();
    input.value = '';
  } else {
    // 密碼錯誤
    input.style.borderColor = '#e53935';
    input.value = '';
    alert('❌ 密碼錯誤');
    setTimeout(() => {
      input.style.borderColor = '#ddd';
    }, 1000);
  }
}

function verifyCode() {
  const input = document.getElementById('code-input');
  const code = input.value.trim();

  if (!code) {
    alert('⚠️ 請輸入驗證碼');
    return;
  }

  if (code === verificationCode) {
    // 驗證碼正確
    document.body.classList.add('authenticated');
    localStorage.setItem('admin-auth', 'true');
    input.value = '';
    alert('✅ 驗證成功！');
  } else {
    // 驗證碼錯誤
    input.style.borderColor = '#e53935';
    input.value = '';
    alert('❌ 驗證碼錯誤，請重試');
    setTimeout(() => {
      input.style.borderColor = '#ddd';
    }, 1000);
  }
}

function backToPassword() {
  document.getElementById('password-form').style.display = 'block';
  document.getElementById('code-form').style.display = 'none';
  document.getElementById('password-input').focus();
  document.getElementById('code-input').value = '';
  verificationCode = null;
}

// 頁面加載時檢查是否已認證
window.addEventListener('load', function() {
  if (localStorage.getItem('admin-auth') === 'true') {
    document.body.classList.add('authenticated');
  }
});

// 登出功能（可選）
function logout() {
  localStorage.removeItem('admin-auth');
  document.body.classList.remove('authenticated');
  location.reload();
}
</script>

</body>
</html>
